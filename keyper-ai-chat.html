<!DOCTYPE html>

<html>
<head>
<title>Keyper AI Documentation Assistant</title>

<style>
body{
font-family: Arial, Helvetica, sans-serif;
}

#chatButton{
position:fixed;
bottom:20px;
right:20px;
background:#0078D4;
color:white;
border:none;
padding:14px 18px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

#chatWindow{
display:none;
position:fixed;
bottom:80px;
right:20px;
width:350px;
height:450px;
background:white;
border:1px solid #ccc;
border-radius:10px;
box-shadow:0px 5px 15px rgba(0,0,0,0.2);
flex-direction:column;
}

#chatHeader{
background:#0078D4;
color:white;
padding:10px;
font-weight:bold;
border-top-left-radius:10px;
border-top-right-radius:10px;
}

#chatMessages{
flex:1;
padding:10px;
overflow-y:auto;
font-size:14px;
}

.message{
margin-bottom:10px;
}

.user{
text-align:right;
}

.bot{
text-align:left;
}

#chatInputContainer{
display:flex;
border-top:1px solid #ccc;
}

#chatInput{
flex:1;
padding:10px;
border:none;
outline:none;
}

#sendBtn{
background:#0078D4;
color:white;
border:none;
padding:10px 14px;
cursor:pointer;
}

#disclaimer{
font-size:11px;
color:#666;
padding:5px 10px;
border-top:1px solid #eee;
}
</style>

</head>

<body>

<button id="chatButton">Chat with Keyper AI</button>

<div id="chatWindow">

<div id="chatHeader">
Keyper Documentation Assistant
</div>

<div id="chatMessages"></div>

<div id="chatInputContainer">
<input id="chatInput" placeholder="Ask a question about Keyper..." />
<button id="sendBtn">Send</button>
</div>

<div id="disclaimer">
AI-generated responses based on Keyper product documentation.
</div>

</div>

<script>

const API_URL = "https://keyper-docs-ai-api-anh2a5emg4fqcxca.eastus-01.azurewebsites.net/api/chat?code=CRS_iGdxzPqVIiVhAokgXxjm7YxSkZhPuSp6e9TAA6iwAzFuO9auUA=="

const chatButton = document.getElementById("chatButton")
const chatWindow = document.getElementById("chatWindow")
const sendBtn = document.getElementById("sendBtn")
const chatInput = document.getElementById("chatInput")
const chatMessages = document.getElementById("chatMessages")

chatButton.onclick = () => {
chatWindow.style.display =
chatWindow.style.display === "flex" ? "none" : "flex"
}

function addMessage(text, sender){

const div = document.createElement("div")
div.className = "message " + sender
div.innerText = text

chatMessages.appendChild(div)

chatMessages.scrollTop = chatMessages.scrollHeight
}

async function sendMessage(){

const question = chatInput.value.trim()

if(!question) return

addMessage(question,"user")

chatInput.value=""

addMessage("Thinking...","bot")

try{

const response = await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
question: question
})
})

const data = await response.json()

chatMessages.lastChild.remove()

addMessage(data.answer,"bot")

}catch(err){

chatMessages.lastChild.remove()

addMessage("Sorry — the assistant is currently unavailable.","bot")

}

}

sendBtn.onclick = sendMessage

chatInput.addEventListener("keypress",function(e){
if(e.key==="Enter"){
sendMessage()
}
})

</script>

</body>
</html>
