<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Keyper AI Documentation Assistant</title>

<style>

body{
    font-family: Arial, sans-serif;
}

#chat-button{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#0078d4;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
}

#chat-window{
    position:fixed;
    bottom:70px;
    right:20px;
    width:360px;
    height:500px;
    background:white;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
    display:none;
    flex-direction:column;
}

#chat-header{
    background:#0078d4;
    color:white;
    padding:12px;
    border-top-left-radius:10px;
    border-top-right-radius:10px;
    font-weight:bold;
}

#messages{
    flex:1;
    overflow-y:auto;
    padding:12px;
    display:flex;
    flex-direction:column;
}

.message{
    margin:6px 0;
    padding:10px;
    border-radius:10px;
    max-width:85%;
    line-height:1.4;
}

.user{
    background:#0078d4;
    color:white;
    align-self:flex-end;
}

.bot{
    background:#f1f1f1;
    align-self:flex-start;
}

.typing{
    font-style:italic;
    opacity:0.7;
}

#input-area{
    display:flex;
    border-top:1px solid #ddd;
}

#question{
    flex:1;
    border:none;
    padding:10px;
}

#send{
    border:none;
    background:#0078d4;
    color:white;
    padding:10px 14px;
    cursor:pointer;
}

.footer{
    font-size:11px;
    text-align:center;
    padding:6px;
    color:#888;
}

</style>
</head>

<body>

<button id="chat-button">Chat with Keyper AI</button>

<div id="chat-window">

<div id="chat-header">
Keyper Documentation Assistant
</div>

<div id="messages"></div>

<div id="input-area">
<input id="question" placeholder="Ask a question about Keyper manuals..." />
<button id="send">Send</button>
</div>

<div class="footer">
AI-generated responses based on Keyper product documentation
</div>

</div>

<script>

const endpoint = "https://keyper-docs-ai-api-anh2a5emg4fqcxca.eastus-01.azurewebsites.net/api/chat?code=CRS_iGdxzPqVIiVhAokgXxjm7YxSkZhPuSp6e9TAA6iwAzFuO9auUA==";

const chatBtn = document.getElementById("chat-button");
const chatWindow = document.getElementById("chat-window");
const messages = document.getElementById("messages");
const sendBtn = document.getElementById("send");
const questionInput = document.getElementById("question");

let initialized = false;

function addMessage(text,type){

    const msg=document.createElement("div")
    msg.className=`message ${type}`
    msg.innerHTML=text

    messages.appendChild(msg)
    messages.scrollTop=messages.scrollHeight

}

function typeWriter(element,text,speed=10){

    let i=0

    function typing(){

        if(i<text.length){
            element.innerHTML+=text.charAt(i)
            i++
            messages.scrollTop=messages.scrollHeight
            setTimeout(typing,speed)
        }

    }

    typing()

}

chatBtn.onclick = () => {

    if(chatWindow.style.display==="flex"){
        chatWindow.style.display="none"
        return
    }

    chatWindow.style.display="flex"

    if(!initialized){

        const welcome = `
Hello! I'm the Keyper Documentation Assistant.<br><br>
Ask me anything about the Keyper product manuals and I will try to find the answer for you.
`

        addMessage(welcome,"bot")
        initialized=true
    }

}

async function sendQuestion(){

    const question=questionInput.value.trim()

    if(!question) return

    addMessage(question,"user")

    questionInput.value=""

    const typingMsg=document.createElement("div")
    typingMsg.className="message bot typing"
    typingMsg.innerHTML="Typing..."
    messages.appendChild(typingMsg)

    messages.scrollTop=messages.scrollHeight

    try{

        const response = await fetch(endpoint,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({question})
        })

        const data = await response.json()

        typingMsg.remove()

        const formatted = data.answer
            .replace(/\n/g,"<br>")
            .replace(/•/g,"<br>•")

        const msg=document.createElement("div")
        msg.className="message bot"
        messages.appendChild(msg)

        typeWriter(msg,formatted)

    }catch(err){

        typingMsg.remove()

        addMessage("Sorry — the assistant is currently unavailable.","bot")

        console.error(err)

    }

}

sendBtn.onclick = sendQuestion

questionInput.addEventListener("keypress",function(e){

    if(e.key==="Enter") sendQuestion()

})

</script>

</body>
</html>
